<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Pronóstico Mundialista · Visiting Galápagos 2026</title>
  <style>
    :root {
      --navy:       #0f3460;
      --navy-mid:   #16213e;
      --navy-dark:  #0a1f3a;
      --red:        #e94560;
      --gold:       #f5c842;
      --silver:     #c0c0c0;
      --bronze:     #cd7f32;
      --green:      #4caf50;
      --text:       #e0e8f0;
      --muted:      #7a9bbf;
      --surface:    #1a3050;
      --surface2:   #1e3860;
      --border:     #2a4a70;
      --radius:     12px;
      --shadow:     0 4px 24px rgba(0,0,0,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy-mid) 60%, #1a1a2e 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ── */
    header {
      background: rgba(15,52,96,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .logo { font-size: 1.5rem; }
    header h1   { font-size: 1rem; font-weight: 700; line-height: 1.2; }
    header h1 span { display: block; font-size: 0.72rem; font-weight: 400; color: var(--muted); }
    .header-tabs { margin-left: auto; display: flex; gap: 6px; }
    .tab-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all .2s;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* ── Layout ── */
    main { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── Cards ── */
    .card {
      background: rgba(26,48,80,0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; }

    /* ── Match schedule grid ── */
    .day-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 10px;
    }
    .day-label:first-child { margin-top: 0; }

    .match-card {
      background: rgba(26,48,80,0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
    }
    .match-card:hover { border-color: rgba(233,69,96,0.4); }
    .match-card.locked { opacity: 0.6; }

    .match-teams {
      flex: 1;
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .match-teams small {
      display: block;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
    }
    .match-id {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 30px;
      text-align: center;
    }

    .btn-apostar {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .2s;
    }
    .btn-apostar:hover { background: #c73650; }
    .btn-cerrado {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .btn-jugado {
      background: rgba(76,175,80,0.15);
      color: var(--green);
      border: 1px solid rgba(76,175,80,0.3);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── Single-match bet form ── */
    #view-bet { display: none; }
    .bet-match-header {
      text-align: center;
      padding: 28px 20px 20px;
    }
    .bet-match-header .mid-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .bet-teams {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 1.2rem;
      font-weight: 800;
    }
    .bet-vs {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 6px;
    }
    .bet-time {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Score inputs */
    .score-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 20px 0;
    }
    .score-team {
      text-align: center;
      flex: 1;
      max-width: 140px;
    }
    .score-team label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .score-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 2.2rem;
      font-weight: 800;
      text-align: center;
      padding: 12px 8px;
      outline: none;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .score-input:focus { border-color: var(--red); }
    .score-dash { font-size: 2rem; font-weight: 800; color: var(--muted); }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .form-group input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input[type="text"]:focus { border-color: var(--red); }

    .btn-primary {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    .btn-primary:hover:not(:disabled) { background: #c73650; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Lock overlay */
    .lock-card {
      text-align: center;
      padding: 32px 20px;
    }
    .lock-icon { font-size: 3rem; margin-bottom: 12px; }
    .lock-card p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

    /* Feedback */
    .feedback {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.88rem;
      margin-top: 12px;
      display: none;
      line-height: 1.5;
    }
    .feedback.ok  { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.4); color: #81c784; }
    .feedback.err { background: rgba(233,69,96,0.15);  border: 1px solid rgba(233,69,96,0.4);  color: #ef9a9a; }

    /* ── Spinner ── */
    .spinner {
      display: flex; justify-content: center; padding: 24px;
    }
    .spinner::after {
      content: '';
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Ranking ── */
    .rtable { width: 100%; border-collapse: collapse; }
    .rtable th {
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 8px 10px;
      border-bottom: 2px solid var(--border);
    }
    .rtable td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .rtable tr:last-child td { border-bottom: none; }
    .rtable tr:hover td { background: rgba(255,255,255,0.02); }

    .pts-badge {
      display: inline-block;
      background: var(--navy);
      border: 1px solid var(--border);
      color: var(--gold);
      font-weight: 800;
      font-size: 0.82rem;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .prize-badge {
      display: inline-block;
      background: rgba(245,200,66,0.12);
      border: 1px solid rgba(245,200,66,0.35);
      color: var(--gold);
      font-weight: 700;
      font-size: 0.82rem;
      padding: 2px 9px;
      border-radius: 12px;
    }

    .match-rank-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .match-rank-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: rgba(15,52,96,0.6);
      font-size: 0.84rem;
      flex-wrap: wrap;
    }
    .match-rank-header .pool {
      margin-left: auto;
      background: rgba(245,200,66,0.15);
      border: 1px solid rgba(245,200,66,0.3);
      color: var(--gold);
      font-weight: 700;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .match-rank-card .rtable { font-size: 0.82rem; }

    /* ── Admin ── */
    .admin-match-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .admin-match-row:last-child { border-bottom: none; }
    .score-mini {
      width: 48px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      padding: 6px 4px;
      outline: none;
      -moz-appearance: textfield;
    }
    .score-mini::-webkit-outer-spin-button,
    .score-mini::-webkit-inner-spin-button { -webkit-appearance: none; }
    .score-mini:focus { border-color: var(--red); }
    .admin-dash { color: var(--muted); font-weight: 700; }
    .section-day {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 18px 0 6px;
    }
    .section-day:first-child { margin-top: 0; }

    .btn-save {
      background: var(--navy);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: all .2s;
      margin-top: 16px;
    }
    .btn-save:hover { border-color: var(--red); color: var(--red); }

    .result-chip {
      display: inline-block;
      background: rgba(76,175,80,0.15);
      border: 1px solid rgba(76,175,80,0.35);
      color: var(--green);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 2px 8px;
      border-radius: 8px;
    }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      text-decoration: none;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .back-link:hover { color: var(--text); }

    @media (max-width: 480px) {
      header h1 { font-size: 0.88rem; }
      .bet-teams { font-size: 1rem; gap: 10px; }
      .score-input { font-size: 1.8rem; padding: 10px 6px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">⚽</span>
  <h1>Pronóstico Mundialista
    <span>Visiting Galápagos 2026</span>
  </h1>
  <div class="header-tabs" id="main-tabs">
    <button class="tab-btn active" onclick="showPanel('schedule')">Partidos</button>
    <button class="tab-btn" onclick="showPanel('ranking')">Ranking</button>
    <button class="tab-btn" onclick="showPanel('admin')">Admin</button>
  </div>
</header>

<main>

  <!-- ══ VIEW: SINGLE BET (shown when ?p=pXX) ══════════════════════════ -->
  <div id="view-bet">
    <a class="back-link" onclick="goHome()">← Volver a partidos</a>

    <div class="card" id="bet-card">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- ══ PANELS (shown when no ?p=) ════════════════════════════════════ -->
  <div id="view-main">

    <!-- SCHEDULE -->
    <div class="panel active" id="panel-schedule">
      <div id="schedule-content"><div class="spinner"></div></div>
    </div>

    <!-- RANKING -->
    <div class="panel" id="panel-ranking">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 style="margin:0;">🏆 Ranking</h2>
          <button class="btn-apostar" onclick="loadRanking()" style="font-size:0.75rem;padding:6px 12px;">🔄 Actualizar</button>
        </div>
        <div id="ranking-content"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="panel" id="panel-admin">
      <div class="card">
        <h2>🔐 Panel del organizador</h2>
        <div id="admin-lock" style="text-align:center;padding:20px 0;">
          <div style="font-size:2.5rem;margin-bottom:12px;">🔒</div>
          <p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px;">Zona exclusiva del organizador</p>
          <div style="max-width:260px;margin:0 auto;">
            <input type="password" id="admin-pass" placeholder="Contraseña"
                   style="width:100%;background:var(--surface2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;padding:11px 14px;outline:none;margin-bottom:10px;"
                   onkeydown="if(event.key==='Enter')checkAdmin()" />
            <button class="btn-primary" onclick="checkAdmin()">Acceder</button>
            <p id="admin-err" style="color:var(--red);font-size:0.8rem;margin-top:8px;display:none;">Contraseña incorrecta</p>
          </div>
        </div>
        <div id="admin-form" style="display:none;">
          <p style="font-size:0.8rem;color:var(--muted);margin-bottom:14px;">Ingresa el marcador real de cada partido. Deja vacío los no jugados.</p>
          <div id="admin-matches"></div>
          <button class="btn-save" onclick="saveResults()">💾 Guardar resultados</button>
          <div id="admin-feedback" class="feedback"></div>
        </div>
      </div>
    </div>

  </div><!-- /view-main -->

</main>

<script>
// ══════════════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════════════
const SCRIPT_URL    = 'https://script.google.com/macros/s/AKfycbwnSqt9TBrqk3fwon78DNkUJjGOJKSW6GUSt4n_4a3oQWFwJd5JZrC1kgabSTvfFMc/exec';
const ADMIN_PASS    = 'visiting2026';
const PRIZE_PER     = 3;   // $3 por persona por partido
const PRIZE_PCT     = { 1: 0.60, 2: 0.25, 3: 0.15 };

// ── Horarios reales (hora Ecuador UTC-5) ───────────────────────────
const HORARIOS = {
  p01: new Date('2026-06-28T14:00:00-05:00'), // Canadá vs Sudáfrica    — dom 28 jun, 3pm ET
  p02: new Date('2026-06-29T12:00:00-05:00'), // Brasil vs Japón         — lun 29 jun, 1pm ET
  p03: new Date('2026-06-29T15:30:00-05:00'), // Alemania vs Paraguay    — lun 29 jun, 4:30pm ET
  p04: new Date('2026-06-29T20:00:00-05:00'), // Países Bajos vs Marruecos — lun 29 jun, 9pm ET
  p05: new Date('2026-06-30T12:00:00-05:00'), // Costa de Marfil vs Noruega — mar 30 jun, 1pm ET
  p06: new Date('2026-06-30T16:00:00-05:00'), // Francia vs Suecia       — mar 30 jun, 5pm ET
  p07: new Date('2026-06-30T20:00:00-05:00'), // México vs Ecuador        — mar 30 jun, 9pm ET
  p08: new Date('2026-07-01T15:00:00-05:00'), // Bélgica vs Senegal      — mié 1 jul, 4pm ET
  p09: new Date('2026-07-01T19:00:00-05:00'), // Estados Unidos vs Bosnia — mié 1 jul, 8pm ET
  p10: new Date('2026-07-01T11:00:00-05:00'), // Inglaterra vs RD Congo  — mié 1 jul, 12pm ET
  p11: new Date('2026-07-02T14:00:00-05:00'), // España vs Austria       — jue 2 jul, 3pm ET
  p12: new Date('2026-07-02T18:00:00-05:00'), // Portugal vs Croacia     — jue 2 jul, 7pm ET
  p13: new Date('2026-07-02T22:00:00-05:00'), // Suiza vs Argelia        — jue 2 jul, 11pm ET
  p14: new Date('2026-07-03T13:00:00-05:00'), // Australia vs Egipto     — vie 3 jul, 2pm ET
  p15: new Date('2026-07-03T17:00:00-05:00'), // Argentina vs Cabo Verde — vie 3 jul, 6pm ET
  p16: new Date('2026-07-03T20:30:00-05:00'), // Colombia vs Ghana       — vie 3 jul, 9:30pm ET
};

const MATCHES = [
  { id:'p01', local:'Canadá',          visitante:'Sudáfrica',   fecha:'Dom 28 jun' },
  { id:'p02', local:'Brasil',           visitante:'Japón',       fecha:'Lun 29 jun' },
  { id:'p03', local:'Alemania',         visitante:'Paraguay',    fecha:'Lun 29 jun' },
  { id:'p04', local:'Países Bajos',    visitante:'Marruecos',   fecha:'Lun 29 jun' },
  { id:'p05', local:'Costa de Marfil', visitante:'Noruega',     fecha:'Mar 30 jun' },
  { id:'p06', local:'Francia',          visitante:'Suecia',      fecha:'Mar 30 jun' },
  { id:'p07', local:'México',           visitante:'Ecuador',     fecha:'Mar 30 jun' },
  { id:'p08', local:'Bélgica',         visitante:'Senegal',     fecha:'Mié 1 jul'  },
  { id:'p09', local:'Estados Unidos',  visitante:'Bosnia',      fecha:'Mié 1 jul'  },
  { id:'p10', local:'Inglaterra',       visitante:'RD Congo',    fecha:'Mié 1 jul'  },
  { id:'p11', local:'España',          visitante:'Austria',     fecha:'Jue 2 jul'  },
  { id:'p12', local:'Portugal',         visitante:'Croacia',     fecha:'Jue 2 jul'  },
  { id:'p13', local:'Suiza',           visitante:'Argelia',     fecha:'Jue 2 jul'  },
  { id:'p14', local:'Australia',        visitante:'Egipto',      fecha:'Vie 3 jul'  },
  { id:'p15', local:'Argentina',        visitante:'Cabo Verde',  fecha:'Vie 3 jul'  },
  { id:'p16', local:'Colombia',         visitante:'Ghana',       fecha:'Vie 3 jul'  },
];

// ══════════════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════════════
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function isLocked(pid) {
  const h = HORARIOS[pid];
  return h ? Date.now() >= h.getTime() : false;
}

function fmtHora(pid) {
  const h = HORARIOS[pid];
  if (!h) return '';
  return h.toLocaleString('es-EC', { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

async function apiFetch(action) {
  const r = await fetch(SCRIPT_URL + '?action=' + action + '&t=' + Date.now());
  return r.json();
}

async function apiPost(body) {
  const r = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return r.json();
}

// ══════════════════════════════════════════════════════════════════════
//  ROUTING
// ══════════════════════════════════════════════════════════════════════
const params  = new URLSearchParams(location.search);
const BET_PID = params.get('p'); // "p07" or null

document.addEventListener('DOMContentLoaded', () => {
  if (BET_PID) {
    showBetView(BET_PID);
  } else {
    document.getElementById('view-main').style.display = 'block';
    loadSchedule();
  }
});

function goHome() {
  location.href = location.pathname;
}

// ══════════════════════════════════════════════════════════════════════
//  PANEL NAVIGATION (main view)
// ══════════════════════════════════════════════════════════════════════
let activePanel = 'schedule';

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  activePanel = name;
  if (name === 'ranking') loadRanking();
}

// ══════════════════════════════════════════════════════════════════════
//  SCHEDULE VIEW
// ══════════════════════════════════════════════════════════════════════
async function loadSchedule() {
  let results = {};
  try {
    const res = await apiFetch('resultados');
    res.forEach(r => { results[r.partido] = r; });
  } catch(e) {}

  let html = '';
  let currentDate = '';

  MATCHES.forEach(m => {
    if (m.fecha !== currentDate) {
      currentDate = m.fecha;
      html += `<div class="day-label">${m.fecha}</div>`;
    }

    const locked  = isLocked(m.id);
    const hora    = fmtHora(m.id);
    const res     = results[m.id];
    const played  = res && !(Number(res.local) === 0 && Number(res.visitante) === 0);
    const scoreStr = played ? `${res.local} - ${res.visitante}` : null;

    let action;
    if (played) {
      action = `<span class="btn-jugado">${scoreStr}</span>`;
    } else if (locked) {
      action = `<span class="btn-cerrado">🔒 Cerrado</span>`;
    } else {
      action = `<a class="btn-apostar" href="?p=${m.id}">Apostar →</a>`;
    }

    html += `<div class="match-card ${locked && !played ? 'locked' : ''}">
      <span class="match-id">${m.id.toUpperCase()}</span>
      <div class="match-teams">
        ${esc(m.local)} <span style="color:var(--muted);font-weight:400;">vs</span> ${esc(m.visitante)}
        <small>${hora}</small>
      </div>
      ${action}
    </div>`;
  });

  document.getElementById('schedule-content').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════
//  BET VIEW (single match)
// ══════════════════════════════════════════════════════════════════════
function showBetView(pid) {
  document.getElementById('view-main').style.display  = 'none';
  document.getElementById('view-bet').style.display   = 'block';
  document.getElementById('main-tabs').style.display  = 'none';

  const m = MATCHES.find(x => x.id === pid);
  if (!m) {
    document.getElementById('bet-card').innerHTML =
      '<p style="color:var(--muted);text-align:center;padding:24px;">Partido no encontrado.</p>';
    return;
  }

  const locked = isLocked(pid);
  const hora   = fmtHora(pid);

  if (locked) {
    document.getElementById('bet-card').innerHTML = `
      <div class="lock-card">
        <div class="lock-icon">🔒</div>
        <h2 style="margin-bottom:10px;">${esc(m.local)} vs ${esc(m.visitante)}</h2>
        <p>El plazo para apostar en este partido ya cerró.<br>
           <span style="color:var(--muted);font-size:0.8rem;">Inicio: ${hora}</span></p>
      </div>`;
    return;
  }

  document.getElementById('bet-card').innerHTML = `
    <div class="bet-match-header">
      <div class="mid-tag">${pid.toUpperCase()} · ${m.fecha}</div>
      <div class="bet-teams">
        <span>${esc(m.local)}</span>
        <span class="bet-vs">VS</span>
        <span>${esc(m.visitante)}</span>
      </div>
      <div class="bet-time">🕐 Inicio: ${hora}</div>
    </div>

    <div class="score-row">
      <div class="score-team">
        <label>${esc(m.local)}</label>
        <input class="score-input" type="number" id="gol-local" min="0" max="20" value="0" />
      </div>
      <span class="score-dash">-</span>
      <div class="score-team">
        <label>${esc(m.visitante)}</label>
        <input class="score-input" type="number" id="gol-visit" min="0" max="20" value="0" />
      </div>
    </div>

    <div class="form-group">
      <label>Tu nombre</label>
      <input type="text" id="nombre-input" placeholder="Ej: Juan García" autocomplete="off" />
    </div>

    <button class="btn-primary" id="btn-submit" onclick="submitBet('${pid}')">
      ✅ Confirmar apuesta — $${PRIZE_PER}
    </button>
    <div class="feedback" id="bet-feedback"></div>`;
}

async function submitBet(pid) {
  const nombre = document.getElementById('nombre-input').value.trim();
  const gLocal = parseInt(document.getElementById('gol-local').value, 10);
  const gVisit = parseInt(document.getElementById('gol-visit').value, 10);

  if (!nombre) {
    showFeedback('bet-feedback', 'err', '⚠️ Ingresa tu nombre.');
    return;
  }
  if (isNaN(gLocal) || isNaN(gVisit) || gLocal < 0 || gVisit < 0) {
    showFeedback('bet-feedback', 'err', '⚠️ Ingresa un marcador válido.');
    return;
  }
  if (isLocked(pid)) {
    showFeedback('bet-feedback', 'err', '🔒 El tiempo para apostar ya cerró.');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    // Obtener pronósticos existentes del participante
    const existing = await apiFetch('ranking');
    const userRow  = existing.find(r => String(r.nombre||'').trim().toLowerCase() === nombre.toLowerCase());

    // Construir payload con todos los partidos del usuario, actualizando solo este
    const payload = { tipo: 'pronostico', nombre };
    MATCHES.forEach(m2 => {
      if (m2.id === pid) {
        payload[m2.id] = `${gLocal}-${gVisit}`;
      } else {
        payload[m2.id] = userRow ? (String(userRow[m2.id] || '-').trim() || '-') : '-';
      }
    });

    const res = await apiPost(payload);
    if (res.ok) {
      const m = MATCHES.find(x => x.id === pid);
      showFeedback('bet-feedback', 'ok',
        `✅ Apuesta guardada: <strong>${esc(m.local)} ${gLocal} - ${gVisit} ${esc(m.visitante)}</strong><br>
         Participante: <strong>${esc(nombre)}</strong>`);
      btn.textContent = '✅ Apuesta registrada';
    } else {
      throw new Error(res.error || 'Error desconocido');
    }
  } catch(e) {
    btn.disabled   = false;
    btn.textContent = '✅ Confirmar apuesta — $' + PRIZE_PER;
    showFeedback('bet-feedback', 'err', '❌ Error al guardar. Intenta de nuevo.<br><small>' + esc(e.message) + '</small>');
  }
}

// ══════════════════════════════════════════════════════════════════════
//  RANKING
// ══════════════════════════════════════════════════════════════════════
function calcPts(pron, res) {
  if (!pron || String(pron).trim() === '-' || String(pron).trim() === '') return null;
  if (!res) return null;
  const loc = Number(res.local), vis = Number(res.visitante);
  if (loc === 0 && vis === 0) return null;
  const parts = String(pron).trim().split('-');
  if (parts.length !== 2) return null;
  const pL = parseInt(parts[0],10), pV = parseInt(parts[1],10);
  if (isNaN(pL) || isNaN(pV)) return null;
  if (pL === loc && pV === vis) return 3;
  if (Math.sign(pL-pV) === Math.sign(loc-vis)) return 1;
  return 0;
}

async function loadRanking() {
  document.getElementById('ranking-content').innerHTML = '<div class="spinner"></div>';
  try {
    const [rankData, resData] = await Promise.all([apiFetch('ranking'), apiFetch('resultados')]);
    renderRanking(rankData, resData);
  } catch(e) {
    document.getElementById('ranking-content').innerHTML =
      '<p style="color:var(--muted);font-size:0.85rem;padding:8px;">No se pudo cargar el ranking.</p>';
  }
}

function renderRanking(rankData, resData) {
  if (!rankData || rankData.length === 0) {
    document.getElementById('ranking-content').innerHTML =
      '<p style="color:var(--muted);font-size:0.85rem;">Aún no hay pronósticos registrados.</p>';
    return;
  }

  const resMap = {};
  (resData || []).forEach(r => { resMap[r.partido] = r; });

  const earnings = {};
  rankData.forEach(r => { if (r.nombre) earnings[r.nombre] = 0; });

  let matchHtml = '';
  let played = 0;

  MATCHES.forEach(m => {
    const res = resMap[m.id];
    if (!res || (Number(res.local) === 0 && Number(res.visitante) === 0)) return;

    const entries = rankData.map(row => ({
      nombre: row.nombre,
      pron:   String(row[m.id] || '-').trim(),
      pts:    calcPts(row[m.id], res)
    })).filter(e => e.pts !== null);

    if (!entries.length) return;
    played++;

    entries.sort((a,b) => b.pts - a.pts);
    const pool = entries.length * PRIZE_PER;

    // Distribuir premios con empates
    let pos = 1, j = 0;
    while (j < entries.length && pos <= 3) {
      const thisPts = entries[j].pts;
      const tied    = entries.filter(e => e.pts === thisPts);
      let sum = 0;
      for (let p = pos; p < pos + tied.length && p <= 3; p++) sum += (PRIZE_PCT[p]||0) * pool;
      const each = tied.length ? sum / tied.length : 0;
      tied.forEach(e => { earnings[e.nombre] = (earnings[e.nombre]||0) + each; });
      pos += tied.length; j += tied.length;
    }

    const MEDALS = ['🥇','🥈','🥉'];
    let rows = ''; let rp = 1;
    entries.forEach((e,k) => {
      const badge = rp <= 3 ? `<span style="font-size:1rem;">${MEDALS[rp-1]}</span>`
                            : `<span style="color:var(--muted);font-size:0.8rem;">${rp}</span>`;
      rows += `<tr><td style="width:32px;">${badge}</td>
        <td><strong>${esc(e.nombre)}</strong></td>
        <td><span class="pts-badge">${e.pts}</span></td>
        <td style="color:var(--muted);font-size:0.78rem;">${esc(e.pron)}</td></tr>`;
      if (k+1 < entries.length && entries[k+1].pts < e.pts) rp = k+2;
    });

    matchHtml += `<div class="match-rank-card">
      <div class="match-rank-header">
        <span style="font-size:0.68rem;font-weight:700;color:var(--muted);">${m.id.toUpperCase()}</span>
        <span>${esc(m.local)} <strong>${res.local}-${res.visitante}</strong> ${esc(m.visitante)}</span>
        <span class="pool">Pozo $${pool.toFixed(2)}</span>
      </div>
      <table class="rtable">
        <thead><tr><th>Pos</th><th>Nombre</th><th>Pts</th><th>Pronóstico</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });

  // Earnings table
  const list = Object.entries(earnings).sort(([,a],[,b]) => b-a);
  const MEDALS = ['🥇','🥈','🥉'];
  let earHtml = played === 0
    ? '<p style="color:var(--muted);font-size:0.85rem;margin-bottom:20px;">Los premios aparecerán cuando se jueguen los partidos.</p>'
    : `<table class="rtable" style="margin-bottom:24px;">
        <thead><tr><th>Pos</th><th>Nombre</th><th>Ganado</th></tr></thead><tbody>` +
      list.map(([n,t],i) => {
        const badge = i<3 ? `<span style="font-size:1rem;">${MEDALS[i]}</span>`
                           : `<span style="color:var(--muted);font-size:0.8rem;">${i+1}</span>`;
        return `<tr><td style="width:32px;">${badge}</td>
          <td><strong>${esc(n)}</strong></td>
          <td>${t>0?`<span class="prize-badge">$${t.toFixed(2)}</span>`:'<span style="color:var(--muted);">$0.00</span>'}</td></tr>`;
      }).join('') + '</tbody></table>';

  document.getElementById('ranking-content').innerHTML =
    `<p style="font-size:0.75rem;color:var(--muted);margin-bottom:14px;">
      ${played}/${MATCHES.length} partidos jugados · $${PRIZE_PER}/persona/partido
    </p>` +
    earHtml +
    (played > 0 ? `<p style="font-size:0.8rem;color:var(--muted);margin-bottom:12px;font-weight:600;">⚽ Detalle por partido</p>` + matchHtml : '');
}

// ══════════════════════════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════════════════════════
function checkAdmin() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASS) {
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-form').style.display = 'block';
    buildAdminForm();
    loadAdminResults();
  } else {
    document.getElementById('admin-err').style.display = 'block';
    document.getElementById('admin-pass').value = '';
    document.getElementById('admin-pass').focus();
  }
}

function buildAdminForm() {
  let html = '';
  let day  = '';
  MATCHES.forEach(m => {
    if (m.fecha !== day) {
      day = m.fecha;
      html += `<div class="section-day">${m.fecha}</div>`;
    }
    html += `<div class="admin-match-row">
      <span style="font-size:0.85rem;">${esc(m.local)} vs ${esc(m.visitante)}</span>
      <input class="score-mini" type="number" id="r-${m.id}-L" min="0" placeholder="0" />
      <span class="admin-dash">-</span>
      <input class="score-mini" type="number" id="r-${m.id}-V" min="0" placeholder="0" />
    </div>`;
  });
  document.getElementById('admin-matches').innerHTML = html;
}

async function loadAdminResults() {
  try {
    const data = await apiFetch('resultados');
    data.forEach(r => {
      const loc = document.getElementById('r-' + r.partido + '-L');
      const vis = document.getElementById('r-' + r.partido + '-V');
      const lv  = Number(r.local), vv = Number(r.visitante);
      if (loc && (lv > 0 || vv > 0)) loc.value = lv;
      if (vis && (lv > 0 || vv > 0)) vis.value = vv;
    });
  } catch(e) {}
}

async function saveResults() {
  const payload = { tipo: 'resultado' };
  MATCHES.forEach(m => {
    const l = document.getElementById('r-'+m.id+'-L').value.trim();
    const v = document.getElementById('r-'+m.id+'-V').value.trim();
    if (l !== '' && v !== '') payload[m.id] = `${l}-${v}`;
  });

  const fb = document.getElementById('admin-feedback');
  fb.className = 'feedback'; fb.style.display = 'none';
  try {
    const res = await apiPost(payload);
    if (res.ok) {
      showFeedback('admin-feedback', 'ok', '✅ Resultados guardados correctamente.');
    } else {
      throw new Error(res.error);
    }
  } catch(e) {
    showFeedback('admin-feedback', 'err', '❌ Error: ' + esc(e.message));
  }
}

// ══════════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════════
function showFeedback(id, type, msg) {
  const el = document.getElementById(id);
  el.className   = 'feedback ' + type;
  el.innerHTML   = msg;
  el.style.display = 'block';
}
</script>
